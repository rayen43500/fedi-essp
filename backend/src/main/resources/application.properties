spring.application.name=backend

server.port=8086

# Profil par defaut : dev (H2 en memoire, aucune config PostgreSQL requise)
# Pour PostgreSQL : SPRING_PROFILES_ACTIVE=postgres + DB_PASSWORD=votre_mot_de_passe
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=replace-with-a-very-long-secret-key-for-dev-only
app.jwt.expiration-minutes=180

# Assistant IA Gemini (obligatoire pour l'assistant intelligent)
# Windows PowerShell : $env:GEMINI_API_KEY = "votre-cle"
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
