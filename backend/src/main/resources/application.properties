spring.application.name=backend

server.port=8080

# PostgreSQL defaults for local development.
# Override with environment variables if your credentials differ.
# DB_URL example: jdbc:postgresql://localhost:5432/postgres
# DB_USERNAME example: postgres
# DB_PASSWORD default here is root
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=replace-with-a-very-long-secret-key-for-dev-only
app.jwt.expiration-minutes=180
